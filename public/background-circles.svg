  <circle cx="54" cy="308" r="17" fill="#F1C83D" opacity="0.86" filter="url(#softBlur)"/>
  <circle cx="63" cy="453" r="26" fill="#F0DADF" opacity="0.68"/>
  <circle cx="128" cy="584" r="16" fill="#E9D7BD" opacity="0.75"/>
  <circle cx="486" cy="418" r="35" fill="#EDE7E0" opacity="0.64"/>
  <circle cx="390" cy="117" r="10" fill="#F5DCDD" opacity="0.7"/>
